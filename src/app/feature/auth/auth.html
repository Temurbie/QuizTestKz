<div class="min-h-screen flex items-center justify-center  from-blue-100 via-white to-blue-200 p-4">
  <form [formGroup]="authForm"
        class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 sm:p-8 space-y-6">

    <!-- Title -->
    <div class="text-center space-y-1">
      <h2 class="text-2xl font-bold text-gray-800">Вход</h2>
      <p class="text-sm text-gray-500">Войдите в свой аккаунт</p>
      <p>Diqqat <span class="text-red-500 font-extrabold">!!!</span> Не передавайте свой аккаунт третьим лицам, иначе он будет занесён в чёрный список.</p>
    </div>

    <!-- Login -->
    <div class="space-y-1">
      <label class="text-sm text-gray-600">Логин</label>
      <input
        type="text"
        formControlName="login"
        placeholder="Login kiriting"
        class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
      />
    </div>

    <!-- Parol -->
    <div class="space-y-1">
      <label class="text-sm text-gray-600">Пароль</label>
      <input
        type="password"
        formControlName="parol"
        placeholder="Parol kiriting"
        class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
      />
    </div>

    <!-- Button -->
    <button
      type="submit"
      class="w-full bg-blue-600 text-white py-3 rounded-xl font-medium
             hover:bg-blue-700 active:scale-[0.99] transition"
             (click)="login()"
             >
      Вход
    </button>

    <!-- Footer -->
    <p class="text-center text-sm text-gray-500">
      У вас нет аккаунта?
      <a class="text-blue-600 hover:underline cursor-pointer" href="https://t.me/Temurbie">Регистрация</a>
    </p>

  </form>

</div>
