<div class="min-h-screen flex items-center justify-center from-blue-100 via-white to-blue-200 p-4">
  <form [formGroup]="authForm"
        class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 sm:p-8 space-y-6">

    <!-- Title -->
    <div class="text-center space-y-1">
      <h2 class="text-2xl font-bold text-gray-800">Кіру</h2>
      <p class="text-sm text-gray-500">Аккаунтыңызға кіріңіз</p>
      <p>
        Назар аударыңыз <span class="text-red-500 font-extrabold">!!!</span>
        Аккаунтыңызды үшінші тұлғаларға бермеңіз, әйтпесе ол қара тізімге енгізіледі.
      </p>
    </div>

    <!-- Login -->
    <div class="space-y-1">
      <label class="text-sm text-gray-600">Логин</label>
      <input
        type="text"
        formControlName="login"
        placeholder="Логин енгізіңіз"
        class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
      />
    </div>

    <!-- Parol -->
    <div class="space-y-1">
      <label class="text-sm text-gray-600">Құпия сөз</label>
      <input
        type="password"
        formControlName="parol"
        placeholder="Құпия сөз енгізіңіз"
        class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
      />
    </div>

    <!-- Button -->
    <button
      type="submit"
      class="w-full bg-blue-600 text-white py-3 rounded-xl font-medium
             hover:bg-blue-700 active:scale-[0.99] transition"
             (click)="login()"
             >
      Кіру
    </button>

    <!-- Footer -->
    <p class="text-center text-sm text-gray-500">
      Аккаунтыңыз жоқ па?
      <a class="text-blue-600 hover:underline cursor-pointer" href="https://t.me/Temurbie">
        Тіркелу
      </a>
    </p>

  </form>

</div>
